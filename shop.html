<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>المتجر - AI Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--surface:#12121a;--card:#1a1a2e;--card2:#16213e;
--accent:#e94560;--accent2:#0f3460;--accent3:#533483;
--gold:#f1c40f;--green:#2ecc71;--blue:#3498db;
--text:#e0e0e0;--muted:#888;--border:#2a2a3e;
--glow:0 0 20px rgba(233,69,96,.3);
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent3);border-radius:4px}

.hero{position:relative;text-align:center;padding:80px 20px 60px;background:linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 50%,#16213e 100%);overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(233,69,96,.08) 0%,transparent 50%);animation:pulse 8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hero h1{font-size:3em;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;margin-bottom:10px}
.hero p{font-size:1.2em;color:var(--muted);position:relative;margin-bottom:30px}
.hero .stats{display:flex;gap:30px;justify-content:center;position:relative;flex-wrap:wrap}
.hero .stat{text-align:center}
.hero .stat .num{font-size:2em;font-weight:900;color:var(--gold)}
.hero .stat .label{font-size:.85em;color:var(--muted)}

nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
nav button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 20px;border-radius:25px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.9em;transition:all .3s}
nav button:hover,nav button.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--glow)}

.container{max-width:1200px;margin:0 auto;padding:30px 20px}
.category-section{margin-bottom:40px;animation:fadeUp .6s ease}
.category-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.category-header h2{font-size:1.6em;font-weight:700}
.category-header .count{background:var(--accent3);color:#fff;padding:3px 12px;border-radius:15px;font-size:.8em}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:all .3s ease;cursor:default}
.card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:var(--glow)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--gold));opacity:0;transition:opacity .3s}
.card:hover::before{opacity:1}
.card .emoji{font-size:2.5em;margin-bottom:12px;display:block}
.card h3{font-size:1.2em;font-weight:700;margin-bottom:8px;color:#fff}
.card .desc{color:var(--muted);font-size:.9em;margin-bottom:16px;line-height:1.6;min-height:44px}
.card .footer{display:flex;justify-content:space-between;align-items:center}
.card .price{font-size:1.3em;font-weight:900;color:var(--gold)}
.card .price small{font-size:.6em;color:var(--muted);font-weight:400}
.btn-order{background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;border:none;padding:10px 22px;border-radius:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.95em;font-weight:700;transition:all .3s}
.btn-order:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(233,69,96,.5)}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:1.4em;margin-bottom:20px;color:#fff;text-align:center}
.modal .selected-service{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:20px;text-align:center}
.modal .selected-service .svc-emoji{font-size:2em}
.modal .selected-service .svc-name{font-weight:700;font-size:1.1em}
.modal .selected-service .svc-price{color:var(--gold);font-weight:900}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;color:var(--muted);font-size:.9em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:'Cairo',sans-serif;font-size:1em;transition:border-color .3s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:80px}
.form-group select option{background:var(--card);color:#fff}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:1em;font-weight:700;cursor:pointer;transition:all .3s}
.btn-submit{background:linear-gradient(135deg,var(--green),#27ae60);color:#fff}
.btn-submit:hover{box-shadow:0 0 20px rgba(46,204,113,.4)}
.btn-cancel{background:var(--card);color:var(--muted);border:1px solid var(--border)!important}
.btn-cancel:hover{color:#fff;border-color:var(--accent)!important}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:14px 28px;border-radius:12px;font-weight:700;z-index:2000;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.footer-bar{text-align:center;padding:40px 20px;color:var(--muted);border-top:1px solid var(--border);margin-top:40px}
.footer-bar a{color:var(--accent);text-decoration:none}
.footer-bar a:hover{text-decoration:underline}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big-emoji{font-size:4em;margin-bottom:10px}

#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.4}
.content{position:relative;z-index:1}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="content">

<div class="hero">
  <h1 id="shopTitle">🛒 المتجر</h1>
  <p id="shopDesc">اختر الخدمة اللي تبيها واطلبها الحين!</p>
  <div class="stats">
    <div class="stat"><div class="num" id="statServices">-</div><div class="label">خدمة</div></div>
    <div class="stat"><div class="num" id="statCategories">-</div><div class="label">تصنيف</div></div>
  </div>
</div>

<nav id="catNav"></nav>

<div class="container" id="shopContent">
  <div class="empty"><div class="big-emoji">⏳</div>جاري تحميل الخدمات...</div>
</div>

<div class="footer-bar">
  <p>صُنع بـ ❤️ | <a href="/dashboard">لوحة التحكم</a></p>
</div>

</div>

<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <h3>📝 اطلب الخدمة</h3>
    <div class="selected-service" id="modalServiceInfo"></div>
    <div class="form-group">
      <label>الاسم الكامل</label>
      <input id="orderName" placeholder="اسمك" />
    </div>
    <div class="form-group">
      <label>اسم المستخدم في Discord</label>
      <input id="orderDiscord" placeholder="username#0000" />
    </div>
    <div class="form-group">
      <label>الكمية</label>
      <input id="orderQty" type="number" value="1" min="1" max="100" />
    </div>
    <div class="form-group">
      <label>ملاحظات إضافية</label>
      <textarea id="orderNotes" placeholder="أي تفاصيل إضافية关于 الطلب..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
      <button class="btn-submit" onclick="submitOrder()">✅ إرسال الطلب</button>
    </div>
  </div>
</div>

<script>
let allServices=[],allCategories=[],selectedService=null;

const API=location.origin+'/';

async function api(u,opts={}){
  try{const r=await fetch(API+u,opts);return await r.json()}catch{return null}
}

function fmt(n){return (n||0).toLocaleString('ar-EG')+' كريديت'}

async function init(){
  allServices=await api('api/services');
  allCategories=await api('api/categories');
  if(!Array.isArray(allServices))allServices=[];
  if(!Array.isArray(allCategories))allCategories=[];
  const active=allServices.filter(s=>s.active);
  document.getElementById('statServices').textContent=active.length;
  document.getElementById('statCategories').textContent=allCategories.length;
  buildNav();
  renderServices();
}

function buildNav(){
  const nav=document.getElementById('catNav');
  const grouped={};
  const active=allServices.filter(s=>s.active);
  active.forEach(s=>{const c=s.category||'other';if(!grouped[c])grouped[c]=[];grouped[c].push(s)});
  let html='<button class="active" onclick="filterCat(\'all\',this)">الكل</button>';
  allCategories.forEach(c=>{
    if(grouped[c.id])html+=`<button onclick="filterCat('${c.id}',this)">${c.emoji} ${c.name}</button>`;
  });
  nav.innerHTML=html;
}

let currentFilter='all';
function filterCat(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderServices();
}

function renderServices(){
  const container=document.getElementById('shopContent');
  const active=allServices.filter(s=>s.active);
  if(!active.length){container.innerHTML='<div class="empty"><div class="big-emoji">📭</div>لا توجد خدمات متاحة حالياً</div>';return;}

  const grouped={};
  active.forEach(s=>{const c=s.category||'other';if(!grouped[c])grouped[c]=[];grouped[c].push(s)});

  let html='';
  const catsToShow=currentFilter==='all'?allCategories:allCategories.filter(c=>c.id===currentFilter);

  catsToShow.forEach(cat=>{
    const svcs=grouped[cat.id];
    if(!svcs||!svcs.length)return;
    html+=`<div class="category-section">
      <div class="category-header"><h2>${cat.emoji} ${cat.name}</h2><span class="count">${svcs.length} خدمة</span></div>
      <div class="grid">${svcs.map(s=>`
        <div class="card">
          <span class="emoji">${s.emoji||'🛒'}</span>
          <h3>${s.name}</h3>
          <div class="desc">${s.description||'لا يوجد وصف'}</div>
          <div class="footer">
            <div class="price">${fmt(s.price)}</div>
            <button class="btn-order" onclick='openOrder(${JSON.stringify(s).replace(/'/g,"&#39;")})'>اطلب الآن</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  });

  if(!html)html='<div class="empty"><div class="big-emoji">🔍</div>لا توجد خدمات في هذا التصنيف</div>';
  container.innerHTML=html;
}

function openOrder(s){
  selectedService=s;
  document.getElementById('modalServiceInfo').innerHTML=`<div class="svc-emoji">${s.emoji||'🛒'}</div><div class="svc-name">${s.name}</div><div class="svc-price">${fmt(s.price)}</div>`;
  document.getElementById('orderQty').value=1;
  document.getElementById('orderNotes').value='';
  document.getElementById('orderModal').classList.add('show');
}

function closeModal(){document.getElementById('orderModal').classList.remove('show');selectedService=null;}

document.getElementById('orderModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

async function submitOrder(){
  if(!selectedService)return;
  const name=document.getElementById('orderName').value.trim();
  const discord=document.getElementById('orderDiscord').value.trim();
  const qty=parseInt(document.getElementById('orderQty').value)||1;
  const notes=document.getElementById('orderNotes').value.trim();
  if(!name||!discord)return toast('❌ اكمل الاسم واسم المستخدم في Discord');

  const btn=document.querySelector('.btn-submit');
  btn.textContent='⏳ جاري الإرسال...';btn.disabled=true;

  const r=await api('api/shop/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({serviceId:selectedService.id,name,discord,qty,notes})});
  btn.textContent='✅ إرسال الطلب';btn.disabled=false;

  if(r&&r.error)return toast('❌ '+r.error);
  closeModal();
  toast('✅ تم إرسال طلبك بنجاح! سنتواصل معك قريباً');
}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),4000);
}

// particles
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  let w,h,particles=[];
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  window.addEventListener('resize',resize);resize();
  for(let i=0;i<50;i++)particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:Math.random()*2+1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1;
      if(p.y<0||p.y>h)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(233,69,96,.4)';ctx.fill();
    });
    for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(233,69,96,${.15*(1-d/120)})`;ctx.stroke()}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

init();
</script>
</body>
</html>
